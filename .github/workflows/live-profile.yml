name: Update Live Profile

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 min
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate WakaTime Stats
        run: |
          curl -H "Authorization: Bearer ${{ secrets.WAKATIME_API_KEY }}" \
          https://wakatime.com/api/v1/users/current/stats/last_7_days > wakatime.json
          # convert JSON to SVG or use ready-made action
      - name: Commit & Push
        run: |
          git config --global user.name "clevertech97"
          git config --global user.email "your-email@example.com"
          git add wakatime.json
          git commit -m "Update WakaTime stats"
          git push
